<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Craftea Cells</title>

<style>

body{
  margin:0;
  overflow:hidden;
  background:#0b0f1f;
  font-family:Arial;
}

canvas{
  display:block;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* GRACZ */

let player = {
  x: canvas.width/2,
  y: canvas.height/2,
  size: 35,
  color: "cyan",
  speed: 3
};

/* MYSZ */

let mouse = {
  x: canvas.width/2,
  y: canvas.height/2
};

document.addEventListener("mousemove", e => {

  mouse.x = e.clientX;
  mouse.y = e.clientY;

});

/* KULKI */

let foods = [];

for(let i=0;i<250;i++){

  foods.push({

    x: Math.random()*5000,
    y: Math.random()*5000,
    size: 8,
    color: randomColor()

  });

}

/* BOTY */

let bots = [];

for(let i=0;i<8;i++){

  bots.push({

    x: Math.random()*5000,
    y: Math.random()*5000,

    size: 30 + Math.random()*40,

    color: randomColor(),

    speed: 1 + Math.random()*2

  });

}

/* LOSOWY KOLOR */

function randomColor(){

  const colors = [
    "cyan",
    "red",
    "lime",
    "yellow",
    "magenta",
    "orange"
  ];

  return colors[
    Math.floor(Math.random()*colors.length)
  ];

}

/* RUCH */

function movePlayer(){

  let angle = Math.atan2(
    mouse.y - canvas.height/2,
    mouse.x - canvas.width/2
  );

  player.x += Math.cos(angle)*player.speed;
  player.y += Math.sin(angle)*player.speed;

}

/* BOTY */

function moveBots(){

  bots.forEach(bot => {

    let angle = Math.random()*Math.PI*2;

    bot.x += Math.cos(angle)*bot.speed;
    bot.y += Math.sin(angle)*bot.speed;

  });

}

/* ZJADANIE */

function eatFood(){

  foods.forEach((food,index)=>{

    let dx = player.x - food.x;
    let dy = player.y - food.y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < player.size){

      foods.splice(index,1);

      player.size += 0.4;

      foods.push({

        x: Math.random()*5000,
        y: Math.random()*5000,

        size: 8,

        color: randomColor()

      });

    }

  });

}

/* BOTY VS GRACZ */

function botCollision(){

  bots.forEach(bot=>{

    let dx = player.x - bot.x;
    let dy = player.y - bot.y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < player.size){

      if(player.size > bot.size){

        player.size += bot.size*0.1;

        bot.x = Math.random()*5000;
        bot.y = Math.random()*5000;

        bot.size = 30;

      } else {

        alert("Zostałeś zjedzony!");

        location.reload();

      }

    }

  });

}

/* KAMERA */

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let camX =
    player.x - canvas.width/2;

  let camY =
    player.y - canvas.height/2;

  /* TŁO */

  ctx.fillStyle = "#0b0f1f";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  /* SIATKA */

  ctx.strokeStyle = "rgba(255,255,255,0.05)";

  for(let x=-camX%50;x<canvas.width;x+=50){

    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();

  }

  for(let y=-camY%50;y<canvas.height;y+=50){

    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();

  }

  /* JEDZENIE */

  foods.forEach(food=>{

    ctx.beginPath();

    ctx.fillStyle = food.color;

    ctx.shadowColor = food.color;
    ctx.shadowBlur = 15;

    ctx.arc(
      food.x-camX,
      food.y-camY,
      food.size,
      0,
      Math.PI*2
    );

    ctx.fill();

  });

  /* BOTY */

  bots.forEach(bot=>{

    ctx.beginPath();

    ctx.fillStyle = bot.color;

    ctx.shadowColor = bot.color;
    ctx.shadowBlur = 20;

    ctx.arc(
      bot.x-camX,
      bot.y-camY,
      bot.size,
      0,
      Math.PI*2
    );

    ctx.fill();

  });

  /* GRACZ */

  ctx.beginPath();

  ctx.fillStyle = player.color;

  ctx.shadowColor = "cyan";
  ctx.shadowBlur = 30;

  ctx.arc(
    canvas.width/2,
    canvas.height/2,
    player.size,
    0,
    Math.PI*2
  );

  ctx.fill();

  /* UI */

  ctx.shadowBlur = 0;

  ctx.fillStyle = "white";

  ctx.font = "30px Arial";

  ctx.fillText(
    "Rozmiar: "
    + Math.floor(player.size),
    20,
    40
  );

}

/* LOOP */

function update(){

  movePlayer();

  moveBots();

  eatFood();

  botCollision();

  draw();

  requestAnimationFrame(update);

}

update();

</script>

</body>
</html>
